<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoiceLayer — Founder Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0c0e14;
  --surface:  #13151f;
  --surface2: #1c1f2e;
  --border:   #252836;
  --text:     #e2e4ef;
  --muted:    #666d8a;
  --accent:   #6c63ff;
  --green:    #22c55e;
  --red:      #ef4444;
  --orange:   #f97316;
  --blue:     #3b82f6;
  --yellow:   #eab308;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui,-apple-system,sans-serif; font-size: 13px; }

/* ── Login ── */
#login-screen { display:flex; align-items:center; justify-content:center; height:100vh; }
.login-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px 36px; width:340px; }
.login-logo { font-size:20px; font-weight:800; letter-spacing:-.03em; margin-bottom:28px; text-align:center; }
.login-logo span { color:var(--accent); }
.field { margin-bottom:16px; }
.field label { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.field input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px 12px; font-size:13px; outline:none; transition:border-color .15s; }
.field input:focus { border-color:var(--accent); }
.btn-primary { width:100%; background:var(--accent); color:#fff; border:none; border-radius:8px; padding:10px; font-size:13px; font-weight:700; cursor:pointer; transition:opacity .15s; margin-top:4px; }
.btn-primary:hover { opacity:.88; }
.error-msg { color:var(--red); font-size:12px; margin-top:10px; text-align:center; min-height:18px; }

/* ── App shell ── */
#app { display:none; flex-direction:column; height:100vh; }
#app.visible { display:flex; }

/* ── Sidebar ── */
.layout { display:flex; flex:1; overflow:hidden; }
.sidebar { width:220px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:16px 0; }
.sidebar-logo { font-size:14px; font-weight:800; letter-spacing:-.02em; padding:0 18px 16px; border-bottom:1px solid var(--border); margin-bottom:12px; }
.sidebar-logo span { color:var(--accent); }
.sidebar-section { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); padding:8px 18px 4px; }
.nav-item { display:flex; align-items:center; gap:9px; padding:7px 18px; font-size:12px; font-weight:500; cursor:pointer; border-radius:0; color:var(--muted); transition:color .1s,background .1s; }
.nav-item:hover { color:var(--text); background:var(--surface2); }
.nav-item.active { color:var(--text); background:var(--surface2); font-weight:600; }
.nav-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; }
.nav-item.active .nav-dot { background:var(--accent); }
.sidebar-footer { margin-top:auto; padding:12px 18px; border-top:1px solid var(--border); }
.logout-btn { font-size:11px; color:var(--muted); cursor:pointer; background:none; border:none; }
.logout-btn:hover { color:var(--red); }

/* ── Main content ── */
.main { flex:1; overflow-y:auto; padding:24px 28px; }
.page { display:none; }
.page.active { display:block; }

/* ── Page header ── */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
.page-title { font-size:20px; font-weight:800; letter-spacing:-.03em; }
.header-actions { display:flex; gap:8px; align-items:center; }
.period-select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 10px; border-radius:7px; font-size:11px; cursor:pointer; }
.badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:8px; }
.badge-green { background:rgba(34,197,94,.12); color:var(--green); }
.badge-blue  { background:rgba(59,130,246,.12); color:var(--blue); }
.icon-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 11px; border-radius:7px; font-size:11px; cursor:pointer; font-weight:600; }
.icon-btn:hover { border-color:var(--accent); }
.back-btn { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:12px; cursor:pointer; margin-bottom:16px; }
.back-btn:hover { color:var(--text); }

/* ── KPI grid ── */
.kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; }
.kpi-row-4 { grid-template-columns:repeat(4,1fr); }
.kpi { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
.kpi-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:8px; }
.kpi-value { font-size:24px; font-weight:800; letter-spacing:-.03em; line-height:1; }
.kpi-sub   { font-size:10px; color:var(--muted); margin-top:5px; }
.kpi-green .kpi-value { color:var(--green); }
.kpi-blue  .kpi-value { color:var(--blue); }
.kpi-accent .kpi-value { color:var(--accent); }
.kpi-orange .kpi-value { color:var(--orange); }

/* ── Charts ── */
.charts-2 { display:grid; grid-template-columns:2fr 1fr; gap:12px; margin-bottom:16px; }
.charts-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
.charts-equal { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
.card-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:14px; }

/* ── Apps table (overview) ── */
.apps-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
table { width:100%; border-collapse:collapse; }
th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:11px 14px; border-bottom:1px solid rgba(255,255,255,.04); font-size:12px; vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr.app-row:hover td { background:var(--surface2); cursor:pointer; }
.app-name { font-weight:700; color:var(--text); }
.app-domain { font-size:10px; color:var(--muted); }
.mono { font-family:monospace; font-size:11px; color:var(--blue); }
.pill-small { font-size:10px; font-weight:600; padding:2px 7px; border-radius:6px; white-space:nowrap; }
.pgreen { background:rgba(34,197,94,.12);  color:var(--green); }
.pred   { background:rgba(239,68,68,.12);  color:var(--red); }
.pgrey  { background:var(--surface2); color:var(--muted); }
.sbar-wrap { width:60px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.sbar-fill { height:100%; border-radius:2px; }
.dot-live { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:4px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.ts-label { font-size:10px; color:var(--muted); }

/* ── Latency boxes ── */
.lat-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
.lat-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; text-align:center; }
.lat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.lat-val   { font-size:22px; font-weight:800; }
.lat-sub   { font-size:10px; color:var(--muted); margin-top:3px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.empty { color:var(--muted); text-align:center; padding:20px; font-size:12px; }
.loading { color:var(--muted); padding:20px; text-align:center; }

/* ── Top commands table ── */
.mini-table td:first-child { max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
<body>

<!-- ── Login ────────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Voice<span>Layer</span></div>
    <div class="field">
      <label>Founder Password</label>
      <input id="pw-input" type="password" placeholder="Enter password" autofocus>
    </div>
    <button class="btn-primary" onclick="login()">Sign in</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ── App Shell ─────────────────────────────────────────────────────────────── -->
<div id="app">
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">Voice<span>Layer</span></div>
      <div class="sidebar-section">Analytics</div>
      <div class="nav-item active" id="nav-overview" onclick="showPage('overview')">
        <div class="nav-dot"></div> Overview
      </div>
      <div id="app-nav-section" style="display:none">
        <div class="sidebar-section" style="margin-top:8px">Current App</div>
        <div class="nav-item active" id="nav-app-detail">
          <div class="nav-dot"></div> <span id="nav-app-name">—</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main">

      <!-- ── Overview page ── -->
      <div class="page active" id="page-overview">
        <div class="page-header">
          <div class="page-title">All Apps</div>
          <div class="header-actions">
            <select class="period-select" id="overview-period" onchange="loadOverview()">
              <option value="24h">Last 24h</option>
              <option value="7d" selected>Last 7 days</option>
              <option value="30d">Last 30 days</option>
            </select>
            <div class="badge badge-green" id="live-badge"><span class="dot-live"></span>Live</div>
          </div>
        </div>

        <!-- Aggregate KPIs -->
        <div class="kpi-row kpi-row-4" id="agg-kpis">
          <div class="loading">Loading…</div>
        </div>

        <!-- Apps table -->
        <div class="apps-table-wrap" id="apps-table-wrap">
          <div class="loading">Loading apps…</div>
        </div>
      </div>

      <!-- ── App detail page ── -->
      <div class="page" id="page-detail">
        <div class="back-btn" onclick="showPage('overview')">← All Apps</div>
        <div class="page-header">
          <div class="page-title" id="detail-title">App</div>
          <div class="header-actions">
            <select class="period-select" id="detail-period" onchange="loadDetail(_currentAppId)">
              <option value="24h">Last 24h</option>
              <option value="7d" selected>Last 7 days</option>
              <option value="30d">Last 30 days</option>
            </select>
            <button class="icon-btn" onclick="exportData('csv')">Export CSV</button>
            <button class="icon-btn" onclick="exportData('json')">Export JSON</button>
          </div>
        </div>

        <div id="detail-content"><div class="loading">Loading…</div></div>
      </div>

    </div><!-- /main -->
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let _token        = localStorage.getItem('vl_token') || ''
let _currentAppId = ''
let _charts       = {}

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') login() })
  if (_token) { showApp(); loadOverview() }
})

// ─────────────────────────────────────────────────────────────────────────────
// Auth
// ─────────────────────────────────────────────────────────────────────────────
async function login() {
  const pw = document.getElementById('pw-input').value
  try {
    const r = await api('/api/auth/login', 'POST', { password: pw }, false)
    _token = r.token
    localStorage.setItem('vl_token', _token)
    showApp()
    loadOverview()
  } catch(e) {
    document.getElementById('login-error').textContent = e.message || 'Wrong password'
  }
}

function logout() {
  _token = ''
  localStorage.removeItem('vl_token')
  document.getElementById('app').classList.remove('visible')
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('pw-input').value = ''
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app').classList.add('visible')
}

// ─────────────────────────────────────────────────────────────────────────────
// Navigation
// ─────────────────────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.getElementById('page-' + name).classList.add('active')

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'))
  if (name === 'overview') {
    document.getElementById('nav-overview').classList.add('active')
    document.getElementById('app-nav-section').style.display = 'none'
    loadOverview()
  } else if (name === 'detail') {
    document.getElementById('nav-app-detail').classList.add('active')
    document.getElementById('app-nav-section').style.display = 'block'
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// API helper
// ─────────────────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null, auth = true) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } }
  if (auth) opts.headers['Authorization'] = 'Bearer ' + _token
  if (body) opts.body = JSON.stringify(body)
  const r = await fetch(path, opts)
  if (!r.ok) {
    const j = await r.json().catch(() => ({}))
    throw new Error(j.error || r.statusText)
  }
  return r.json()
}

// ─────────────────────────────────────────────────────────────────────────────
// Overview
// ─────────────────────────────────────────────────────────────────────────────
async function loadOverview() {
  const period = document.getElementById('overview-period').value
  try {
    const data = await api('/api/apps?period=' + period)
    renderAggKPIs(data.aggregate)
    renderAppsTable(data.apps)
  } catch(e) {
    document.getElementById('agg-kpis').innerHTML = `<div class="empty">${e.message}</div>`
    if (e.message.includes('token')) logout()
  }
}

function renderAggKPIs(a) {
  document.getElementById('agg-kpis').innerHTML = `
    <div class="kpi"><div class="kpi-label">Total Apps</div><div class="kpi-value">${a.totalApps}</div><div class="kpi-sub">SDK deployments</div></div>
    <div class="kpi kpi-blue"><div class="kpi-label">Total Commands</div><div class="kpi-value">${fmt(a.totalCommands)}</div><div class="kpi-sub">${fmt(a.totalSessions)} sessions</div></div>
    <div class="kpi kpi-green"><div class="kpi-label">Avg Success Rate</div><div class="kpi-value">${pct(a.avgSuccessRate)}</div><div class="kpi-sub">across all apps</div></div>
    <div class="kpi kpi-orange"><div class="kpi-label">Total Est. Cost</div><div class="kpi-value">${usd(a.totalCostUSD)}</div><div class="kpi-sub">${usd(a.totalSavedUSD)} saved by learning</div></div>
  `
}

function renderAppsTable(apps) {
  if (apps.length === 0) {
    document.getElementById('apps-table-wrap').innerHTML = '<div class="empty">No apps have sent events yet.<br>Add <code>data-analytics-endpoint</code> to your SDK script tag.</div>'
    return
  }
  const rows = apps.map(a => {
    const sr   = (a.successRate * 100).toFixed(1)
    const srColor = a.successRate > .8 ? 'var(--green)' : a.successRate > .5 ? 'var(--orange)' : 'var(--red)'
    const lr   = (a.learnedRatio * 100).toFixed(0)
    const ago  = timeAgo(a.lastSeen)
    return `
    <tr class="app-row" onclick="openApp('${esc(a.appId)}')">
      <td><div class="app-name">${esc(a.appId)}</div></td>
      <td><strong>${fmt(a.totalCommands)}</strong></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="sbar-wrap"><div class="sbar-fill" style="width:${sr}%;background:${srColor}"></div></div>
          <span style="font-size:11px;color:${srColor}">${sr}%</span>
        </div>
      </td>
      <td>${ms(a.avgLatencyMs)}</td>
      <td><span class="${lr>50?'pill-small pgreen':'pill-small pgrey'}">${lr}% AI-free</span></td>
      <td>${fmt(a.totalSessions)}</td>
      <td>${usd(a.estimatedCostUSD)}</td>
      <td class="ts-label">${ago}</td>
    </tr>`
  }).join('')

  document.getElementById('apps-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>App / Domain</th><th>Commands</th><th>Success Rate</th>
        <th>Avg Latency</th><th>AI-Free</th><th>Sessions</th><th>Est. Cost</th><th>Last Active</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`
}

// ─────────────────────────────────────────────────────────────────────────────
// App Detail
// ─────────────────────────────────────────────────────────────────────────────
function openApp(appId) {
  _currentAppId = appId
  document.getElementById('detail-title').textContent = appId
  document.getElementById('nav-app-name').textContent = appId.split('.')[0]
  showPage('detail')
  loadDetail(appId)
}

async function loadDetail(appId) {
  const period = document.getElementById('detail-period').value
  document.getElementById('detail-content').innerHTML = '<div class="loading">Loading…</div>'
  destroyCharts()

  try {
    const d = await api(`/api/apps/${encodeURIComponent(appId)}?period=${period}`)
    renderDetail(d)
  } catch(e) {
    document.getElementById('detail-content').innerHTML = `<div class="empty">${e.message}</div>`
  }
}

function renderDetail(d) {
  const k = d.kpis
  const el = document.getElementById('detail-content')

  el.innerHTML = `
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi kpi-blue"><div class="kpi-label">Total Commands</div><div class="kpi-value">${fmt(k.totalCommands)}</div><div class="kpi-sub">${fmt(k.totalSessions)} sessions</div></div>
      <div class="kpi kpi-green"><div class="kpi-label">Success Rate</div><div class="kpi-value">${pct(k.successRate)}</div><div class="kpi-sub">${k.errors} errors</div></div>
      <div class="kpi"><div class="kpi-label">Avg Latency</div><div class="kpi-value">${ms(k.avgLatencyMs)}</div><div class="kpi-sub">voice → action</div></div>
      <div class="kpi kpi-accent"><div class="kpi-label">AI-Free Rate</div><div class="kpi-value">${pct(k.learnedRatio)}</div><div class="kpi-sub">from learning store</div></div>
      <div class="kpi kpi-orange"><div class="kpi-label">Est. Cost</div><div class="kpi-value">${usd(k.estimatedCostUSD)}</div><div class="kpi-sub">${usd(k.estimatedSavedUSD)} saved</div></div>
    </div>

    <!-- Volume + Source -->
    <div class="charts-2">
      <div class="card"><div class="card-title">Command Volume</div><canvas id="ch-vol" height="130"></canvas></div>
      <div class="card"><div class="card-title">Resolution Source</div><canvas id="ch-src" height="130"></canvas></div>
    </div>

    <!-- Success rate + Language + Actions -->
    <div class="charts-3">
      <div class="card"><div class="card-title">Success Rate Over Time</div><canvas id="ch-sr" height="120"></canvas></div>
      <div class="card"><div class="card-title">Language Split</div><canvas id="ch-lang" height="120"></canvas></div>
      <div class="card"><div class="card-title">Action Types</div><canvas id="ch-act" height="120"></canvas></div>
    </div>

    <!-- Latency breakdown -->
    <div class="lat-row">
      <div class="lat-box"><div class="lat-label">Whisper (Speech→Text)</div><div class="lat-val" style="color:var(--blue)">${ms(k.avgWhisperMs)}</div><div class="lat-sub">avg transcription</div></div>
      <div class="lat-box"><div class="lat-label">Claude (AI Intent)</div><div class="lat-val" style="color:var(--accent)">${ms(k.avgAiMs)}</div><div class="lat-sub">avg AI response</div></div>
      <div class="lat-box"><div class="lat-label">Total End-to-End</div><div class="lat-val" style="color:var(--green)">${ms(k.avgLatencyMs)}</div><div class="lat-sub">voice → action</div></div>
    </div>

    <!-- Tables -->
    <div class="charts-equal">
      <div class="card">
        <div class="card-title">Top Commands</div>
        ${renderTopCmdTable(d.topCommands)}
      </div>
      <div class="card">
        <div class="card-title">Top Failures</div>
        ${renderTopFailTable(d.topFailures)}
      </div>
    </div>

    <!-- Daily 30d chart -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Daily Commands (30 days)</div>
      <canvas id="ch-daily" height="80"></canvas>
    </div>
  `

  // ── Charts ────────────────────────────────────────────────────────────────
  const ts48 = d.timeSeries.slice(-48)
  const labels48 = ts48.map(p => tsLabel(p.ts))

  _charts.vol = new Chart(document.getElementById('ch-vol'), {
    type: 'bar',
    data: {
      labels: labels48,
      datasets: [
        { label: 'AI',      data: ts48.map(p => p.aiCalls),      backgroundColor: '#6c63ff', stack: 's' },
        { label: 'Learned', data: ts48.map(p => p.learnedCalls), backgroundColor: '#22c55e', stack: 's' },
      ]
    },
    options: chartOpts({ stacked: true })
  })

  const src = d.bySource
  _charts.src = new Chart(document.getElementById('ch-src'), {
    type: 'doughnut',
    data: {
      labels: ['Claude AI', 'Learned', 'Local'],
      datasets: [{ data: [src.ai||0, src.learned||0, src.local_extract||0], backgroundColor: ['#6c63ff','#22c55e','#3b82f6'], borderWidth: 0 }]
    },
    options: donutOpts()
  })

  _charts.sr = new Chart(document.getElementById('ch-sr'), {
    type: 'line',
    data: {
      labels: labels48,
      datasets: [{ data: ts48.map(p => +(p.successRate*100).toFixed(1)),
        borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,.08)', tension: 0.4, fill: true, pointRadius: 0 }]
    },
    options: chartOpts({ yMin: 0, yMax: 100, noLegend: true })
  })

  const lang = d.byLang
  _charts.lang = new Chart(document.getElementById('ch-lang'), {
    type: 'doughnut',
    data: {
      labels: ['Hindi', 'English', 'Mixed', 'Unknown'],
      datasets: [{ data: [lang.hi||0, lang.en||0, lang.mixed||0, lang.unknown||0],
        backgroundColor: ['#f97316','#3b82f6','#a855f7','#666d8a'], borderWidth: 0 }]
    },
    options: donutOpts()
  })

  const acts = d.byAction
  const actKeys = Object.keys(acts).sort((a,b) => acts[b]-acts[a])
  _charts.act = new Chart(document.getElementById('ch-act'), {
    type: 'bar',
    data: { labels: actKeys, datasets: [{ data: actKeys.map(k => acts[k]), backgroundColor: '#6c63ff', borderRadius: 4 }] },
    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#666d8a', font: { size: 10 } }, grid: { color: '#252836' } },
                y: { ticks: { color: '#666d8a', font: { size: 10 } }, grid: { display: false } } } }
  })

  if (d.daily?.length) {
    _charts.daily = new Chart(document.getElementById('ch-daily'), {
      type: 'bar',
      data: {
        labels: d.daily.map(p => new Date(p.ts).toLocaleDateString([], { month: 'short', day: 'numeric' })),
        datasets: [{ data: d.daily.map(p => p.commands), backgroundColor: '#6c63ff', borderRadius: 3 }]
      },
      options: chartOpts({ noLegend: true })
    })
  }
}

function renderTopCmdTable(rows) {
  if (!rows.length) return '<div class="empty">No commands yet</div>'
  const r = rows.map(c => {
    const sr = (c.successRate*100).toFixed(0)
    const col = c.successRate>.8?'var(--green)':c.successRate>.5?'var(--orange)':'var(--red)'
    return `<tr>
      <td class="mono">${esc(c.route)}</td>
      <td style="color:var(--muted);font-size:11px">${esc(c.action)}</td>
      <td style="font-weight:600">${c.count}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="sbar-wrap"><div class="sbar-fill" style="width:${sr}%;background:${col}"></div></div><span style="font-size:10px;color:${col}">${sr}%</span></div></td>
    </tr>`
  }).join('')
  return `<table class="mini-table"><thead><tr><th>Route</th><th>Action</th><th>#</th><th>Success</th></tr></thead><tbody>${r}</tbody></table>`
}

function renderTopFailTable(rows) {
  if (!rows.length) return '<div class="empty">No failures 🎉</div>'
  const r = rows.map(f => `<tr>
    <td class="mono">${esc(f.route)}</td>
    <td style="color:var(--red);font-family:monospace;font-size:11px">${esc(f.errorCode)}</td>
    <td style="color:var(--red);font-weight:700">${f.count}</td>
  </tr>`).join('')
  return `<table><thead><tr><th>Route</th><th>Error</th><th>#</th></tr></thead><tbody>${r}</tbody></table>`
}

// ─────────────────────────────────────────────────────────────────────────────
// Export
// ─────────────────────────────────────────────────────────────────────────────
function exportData(fmt) {
  const period = document.getElementById('detail-period').value
  const url = `/api/apps/${encodeURIComponent(_currentAppId)}/export?format=${fmt}&period=${period}`
  const a = document.createElement('a')
  a.href = url
  a.setAttribute('Authorization', 'Bearer ' + _token) // won't work for direct download
  // Use fetch + blob for auth
  fetch(url, { headers: { Authorization: 'Bearer ' + _token } })
    .then(r => r.blob())
    .then(blob => {
      const u = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = u; a.download = `vl-${_currentAppId}-${period}.${fmt}`; a.click()
      setTimeout(() => URL.revokeObjectURL(u), 1000)
    })
}

// ─────────────────────────────────────────────────────────────────────────────
// Chart helpers
// ─────────────────────────────────────────────────────────────────────────────
function destroyCharts() {
  Object.values(_charts).forEach(c => c.destroy())
  _charts = {}
}

function chartOpts({ stacked = false, yMin, yMax, noLegend = false } = {}) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: !noLegend, labels: { color: '#666d8a', boxWidth: 10, font: { size: 10 } } } },
    scales: {
      x: { stacked, ticks: { color: '#666d8a', font: { size: 9 }, maxRotation: 0, maxTicksLimit: 8 }, grid: { color: '#252836' } },
      y: { stacked, min: yMin, max: yMax, ticks: { color: '#666d8a', font: { size: 10 } }, grid: { color: '#252836' } }
    }
  }
}

function donutOpts() {
  return { responsive: true, maintainAspectRatio: false, cutout: '65%',
    plugins: { legend: { position: 'bottom', labels: { color: '#666d8a', boxWidth: 10, font: { size: 10 }, padding: 10 } } } }
}

// ─────────────────────────────────────────────────────────────────────────────
// Formatters
// ─────────────────────────────────────────────────────────────────────────────
function fmt(n)   { if (!n) return '0'; return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n) }
function pct(n)   { return (+(n||0)*100).toFixed(1)+'%' }
function ms(n)    { if (!n) return '—'; return n < 1000 ? n+'ms' : (n/1000).toFixed(1)+'s' }
function usd(n)   { return '$'+(+(n||0)).toFixed(3) }
function esc(s)   { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function tsLabel(ts) { return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }
function timeAgo(ts) {
  const sec = (Date.now() - ts) / 1000
  if (sec < 60)      return 'just now'
  if (sec < 3600)    return Math.floor(sec/60)+'m ago'
  if (sec < 86400)   return Math.floor(sec/3600)+'h ago'
  return Math.floor(sec/86400)+'d ago'
}

// ─────────────────────────────────────────────────────────────────────────────
// Auto-refresh overview every 30s
// ─────────────────────────────────────────────────────────────────────────────
setInterval(() => {
  if (document.getElementById('page-overview').classList.contains('active') && _token) {
    loadOverview()
  }
}, 30_000)
</script>
